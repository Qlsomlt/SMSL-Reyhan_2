name: MLflow CI

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mlops
          environment-file: MLproject/conda.yaml
          auto-activate-base: false

      - name: Install MLflow
        shell: bash -l {0}
        run: |
          pip install mlflow==2.19.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure DagsHub
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "MLFLOW_TRACKING_USERNAME=$DAGSHUB_USERNAME" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=$DAGSHUB_TOKEN" >> $GITHUB_ENV

      - name: Run MLProject
        shell: bash -l {0}
        run: |
          mlflow run MLproject

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLproject/artifacts

      - name: Get Latest MLflow Run ID
        shell: bash -l {0}
        run: |
          python - <<'EOF'
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri("sqlite:///mlflow.db")

          client = MlflowClient()

          exp = client.get_experiment_by_name(
              "Logistic_Regression_Experiment"
          )

          runs = client.search_runs(
              experiment_ids=[exp.experiment_id],
              order_by=["start_time DESC"],
              max_results=1
          )

          run_id = runs[0].info.run_id

          print(run_id)

          with open("run_id.txt", "w") as f:
              f.write(run_id)
          EOF

      - name: Build Docker Image
        shell: bash -l {0}
        run: |
          RUN_ID=$(cat run_id.txt)

          mlflow models build-docker \
            -m runs:/$RUN_ID/logistic_regression_model \
            -n logistic-regression

      - name: Tag Docker Image
        run: |
          docker tag logistic-regression \
            ${{ secrets.DOCKER_USERNAME }}/logistic-regression:latest

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/logistic-regression:latest