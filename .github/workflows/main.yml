name: MLflow CI

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  MLFLOW_TRACKING_URI: https://dagshub.com/Qlsomlt/SMSL-Reyhan_2.mlflow
  DOCKER_APP_IMAGE: ${{ secrets.DOCKER_USERNAME }}/logistic-regression-app
  DOCKER_MLFLOW_IMAGE: ${{ secrets.DOCKER_USERNAME }}/logistic-regression

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mlops
          environment-file: MLproject/conda.yaml
          auto-activate-base: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run MLTraining and Model Tuning
        shell: bash -l {0}
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
           python MLproject/model.py
           python MLproject/model_tuning.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLproject/artifacts

      - name: Get Latest MLflow Run ID
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import mlflow
          from mlflow.tracking import MlflowClient
          import time
          
          mlflow.set_tracking_uri("https://dagshub.com/Qlsomlt/SMSL-Reyhan_2.mlflow")
          
          client = MlflowClient()
          
          max_retries = 10
          retry_delay = 3
          
          for attempt in range(max_retries):
              try:
                  exp = client.get_experiment_by_name("Logistic_Regression_Experiment")
                  if not exp:
                      raise Exception("Experiment not found")
                  runs = client.search_runs(
                      experiment_ids=[exp.experiment_id],
                      order_by=["start_time DESC"],
                      max_results=1
                  )
                  
                  if runs:
                      run_id = runs[0].info.run_id
                      print(f"Found run ID: {run_id}")
                      with open("run_id.txt", "w") as f:
                          f.write(run_id)
                      break
                  else:
                      raise Exception("No runs found in experiment")
              except Exception as e:
                  if attempt < max_retries - 1:
                      print(f"Attempt {attempt + 1} failed: {e}. Retrying in {retry_delay}s...")
                      time.sleep(retry_delay)
                  else:
                      raise
          EOF

      - name: Debug MLflow
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python -c "import mlflow; print(mlflow.get_tracking_uri())"    


      - name: Show MLmodel
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          set -e
          if [ ! -s run_id.txt ]; then
            echo "run_id.txt not found or empty"
            exit 1
          fi
          RUN_ID=$(cat run_id.txt)
          echo "Using RUN_ID=$RUN_ID"
          mlflow artifacts download \
            -r "$RUN_ID" \
            -a logistic_regression_model \
            -d model
          echo "===== MLmodel ====="
          cat model/logistic_regression_model/MLmodel
          echo "===== python_env.yaml ====="
          cat model/logistic_regression_model/python_env.yaml

      - name: Build and Push Dockerfile Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile \
            --tag "$DOCKER_APP_IMAGE:latest" \
            --tag "$DOCKER_APP_IMAGE:${GITHUB_SHA::12}" \
            --push \
            .

      - name: Build MLflow Docker Image
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          PYTHON_VERSION: "3.10"
        run: |
          python --version
          pip --version
          mlflow --version
          echo "MLflow Tracking URI: $MLFLOW_TRACKING_URI"
          echo "MLflow Tracking Username: $MLFLOW_TRACKING_USERNAME"
          RUN_ID=$(cat run_id.txt)

          mlflow models build-docker \
            -m runs:/$RUN_ID/logistic_regression_model \
            -n logistic-regression

      - name: Tag and Push MLflow Docker Image
        run: |
          docker tag logistic-regression "$DOCKER_MLFLOW_IMAGE:latest"
          docker tag logistic-regression "$DOCKER_MLFLOW_IMAGE:${GITHUB_SHA::12}"
          docker push "$DOCKER_MLFLOW_IMAGE:latest"
          docker push "$DOCKER_MLFLOW_IMAGE:${GITHUB_SHA::12}"